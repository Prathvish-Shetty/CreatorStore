spring:
  application:
    name: CreatorStore

  # Database information
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  # Hibernate ORM configuration - dependency: springboot-starter-data-jpa
  jpa: # jakarta persistence api
    hibernate:
      ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true


